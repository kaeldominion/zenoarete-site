<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#0f0f0f;--text:#e8e4de;--muted:#9a9590;--accent:#c9a96e;--font-body:'Inter',sans-serif;--font-display:'Playfair Display',serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-weight:300;line-height:1.8;overflow-x:hidden}
img{max-width:100%;display:block}
a{color:var(--accent);text-decoration:none}

/* ── Nav ── */
.gallery-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);transition:all .4s}
.gallery-nav .logo{display:flex;align-items:center;gap:.8rem}
.gallery-nav .logo img{width:36px;height:36px;border-radius:50%}
.gallery-nav .logo span{font-family:var(--font-display);font-size:1.1rem;letter-spacing:.05em}
.gallery-nav .nav-links{display:flex;gap:2rem;align-items:center}
.gallery-nav .nav-links a{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);transition:color .4s}
.gallery-nav .nav-links a:hover,.gallery-nav .nav-links a.active{color:var(--accent)}
.btn{display:inline-block;padding:.7rem 1.6rem;border:1px solid var(--accent);font-family:var(--font-body);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text);background:transparent;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1)}
.btn:hover{background:var(--accent);color:#0a0a0a;transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,169,110,.2)}
.btn-fill{background:var(--accent);color:#0a0a0a}

/* ── Hero ── */
.gallery-hero{padding:10rem 2rem 4rem;text-align:center}
.gallery-hero .section-label{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;display:block}
.gallery-hero h1{font-family:var(--font-display);font-size:clamp(2.5rem,6vw,4rem);font-weight:400;margin-bottom:1rem;letter-spacing:.02em}
.gallery-hero p{color:var(--muted);font-size:.95rem;max-width:600px;margin:0 auto}
.divider{width:60px;height:1px;background:var(--accent);margin:2rem auto;opacity:.5}

/* ── Filters ── */
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem;padding:0 2rem 3rem;max-width:900px;margin:0 auto}
.filter-btn{padding:.5rem 1.2rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;font-family:var(--font-body);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:transparent;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1)}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{border-color:var(--accent);background:var(--accent);color:#0a0a0a}

/* ── Gallery Grid ── */
.gallery-grid{columns:4;column-gap:8px;padding:0 8px;max-width:1600px;margin:0 auto}
.gallery-item{break-inside:avoid;margin-bottom:8px;position:relative;overflow:hidden;border-radius:4px;cursor:pointer;opacity:0;transform:translateY(30px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
.gallery-item.visible{opacity:1;transform:translateY(0)}
.gallery-item.hidden{display:none}
.gallery-item img{width:100%;display:block;transition:transform .8s cubic-bezier(.16,1,.3,1),filter .6s}
.gallery-item::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.4) 100%);opacity:0;transition:opacity .4s}
.gallery-item:hover::after{opacity:1}
.gallery-item:hover img{transform:scale(1.05);filter:brightness(1.05)}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s}
.lightbox.open{opacity:1;visibility:visible}
.lightbox-img-wrap{position:relative;max-width:92vw;max-height:88vh;display:flex;align-items:center;justify-content:center}
.lightbox-img-wrap img{max-width:92vw;max-height:85vh;object-fit:contain;border-radius:4px;opacity:0;transform:scale(.92);transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1)}
.lightbox.open .lightbox-img-wrap img.loaded{opacity:1;transform:scale(1)}
.lightbox-close{position:absolute;top:1.5rem;right:1.5rem;width:44px;height:44px;border:1px solid rgba(255,255,255,.15);border-radius:50%;background:rgba(0,0,0,.5);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:10}
.lightbox-close:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.1)}
.lightbox-arrow{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border:1px solid rgba(255,255,255,.12);border-radius:50%;background:rgba(0,0,0,.4);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:10}
.lightbox-arrow:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,0,0,.7)}
.lightbox-prev{left:1.5rem}
.lightbox-next{right:1.5rem}
.lightbox-counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.75rem;letter-spacing:.15em;color:var(--muted);z-index:10}

/* ── Footer ── */
footer{background:rgba(10,10,10,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);padding:3rem 2rem;text-align:center;margin-top:4rem}
footer .links{display:flex;gap:2.5rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
footer .links a{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);transition:color .4s}
footer .links a:hover{color:var(--accent)}
footer .copy{font-size:.7rem;color:#444}

/* ── WhatsApp ── */
.whatsapp-float{position:fixed;bottom:28px;right:28px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.35);z-index:999;transition:all .4s cubic-bezier(.16,1,.3,1)}
.whatsapp-float:hover{transform:scale(1.12) translateY(-4px);box-shadow:0 8px 30px rgba(37,211,102,.5)}
.whatsapp-float svg{width:30px;height:30px;fill:#fff}

/* ── Responsive ── */
@media(max-width:1200px){.gallery-grid{columns:3}}
@media(max-width:768px){
  .gallery-grid{columns:2;column-gap:6px;padding:0 6px}
  .gallery-item{margin-bottom:6px}
  .gallery-nav .nav-links{gap:1rem}
  .lightbox-arrow{width:40px;height:40px;font-size:.9rem}
  .lightbox-prev{left:.8rem}
  .lightbox-next{right:.8rem}
  .filters{gap:.4rem;padding:0 1rem 2rem}
  .filter-btn{padding:.4rem .9rem;font-size:.65rem}
}
@media(max-width:480px){
  .gallery-nav .nav-links a:not(.btn){display:none}
  .gallery-hero{padding:8rem 1.5rem 3rem}
  .lightbox-close{top:1rem;right:1rem;width:38px;height:38px}
}

/* ── Loading animation ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.gallery-item.loading{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;min-height:200px}
</style>
</head>

// ═══════════════════════════════════════════
// RENDER GALLERY
// ═══════════════════════════════════════════
const grid = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCounter = document.getElementById('lightbox-counter');
let currentIndex = 0;
let visibleItems = [];

function renderGallery(filter) {
  grid.innerHTML = '';
  visibleItems = [];
  
  galleryData.forEach((item, i) => {
    if (filter !== 'all' && item.cat !== filter) return;
    
    const div = document.createElement('div');
    div.className = 'gallery-item loading';
    div.dataset.index = i;
    
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = `Villa Zeno Arete - ${item.cat}`;
    img.src = item.thumb;
    img.onload = () => { div.classList.remove('loading'); };
    img.onerror = () => { div.remove(); };
    
    div.appendChild(img);
    div.addEventListener('click', () => openLightbox(i));
    grid.appendChild(div);
    visibleItems.push({ el: div, index: i });
  });
  
  // Observe for fade-in
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), Math.random() * 150);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '100px' });
  
  document.querySelectorAll('.gallery-item').forEach(el => obs.observe(el));
}

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.filter);
  });
});

// ═══════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════
function getFilteredIndices() {
  return visibleItems.map(v => v.index);
}

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  lightboxImg.classList.remove('loaded');
}

function updateLightbox() {
  const indices = getFilteredIndices();
  const pos = indices.indexOf(currentIndex);
  const item = galleryData[currentIndex];
  
  lightboxImg.classList.remove('loaded');
  const img = new Image();
  img.onload = () => {
    lightboxImg.src = item.full;
    requestAnimationFrame(() => lightboxImg.classList.add('loaded'));
  };
  img.onerror = () => {
    // Fallback to thumb
    lightboxImg.src = item.thumb;
    requestAnimationFrame(() => lightboxImg.classList.add('loaded'));
  };
  img.src = item.full;
  
  lightboxCounter.textContent = `${pos + 1} / ${indices.length}`;
}

function navigate(dir) {
  const indices = getFilteredIndices();
  const pos = indices.indexOf(currentIndex);
  const newPos = (pos + dir + indices.length) % indices.length;
  currentIndex = indices[newPos];
  updateLightbox();
}

// Event listeners
document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
document.querySelector('.lightbox-prev').addEventListener('click', () => navigate(-1));
document.querySelector('.lightbox-next').addEventListener('click', () => navigate(1));

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Touch/swipe
let touchStartX = 0;
let touchStartY = 0;
lightbox.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

lightbox.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    navigate(dx > 0 ? -1 : 1);
  }
}, { passive: true });

// Initial render
renderGallery('all');
</script>
