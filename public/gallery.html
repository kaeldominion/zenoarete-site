<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Inter',sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden}
a{color:#c9a96e;text-decoration:none}
a:hover{color:#e0c48a}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,169,110,.15)}
.nav-logo{height:36px;opacity:.9}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;color:#c9a96e;transition:color .3s}
.nav-links a:hover{color:#fff}

/* HEADER */
.gallery-header{padding:8rem 2rem 3rem;text-align:center}
.gallery-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:#fff;margin-bottom:.5rem}
.gallery-header p{color:#999;font-size:.95rem;max-width:500px;margin:0 auto}
.gold-line{width:60px;height:1px;background:#c9a96e;margin:1.5rem auto}

/* FILTERS */
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem;padding:0 2rem 2rem;max-width:900px;margin:0 auto}
.filters button{background:transparent;border:1px solid rgba(201,169,110,.3);color:#999;padding:.5rem 1.2rem;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;border-radius:2px}
.filters button:hover,.filters button.active{background:#c9a96e;color:#0a0a0a;border-color:#c9a96e}

/* GRID */
.gallery-grid{columns:4;column-gap:6px;padding:1rem 6px;max-width:1600px;margin:0 auto}
@media(max-width:1200px){.gallery-grid{columns:3}}
@media(max-width:768px){.gallery-grid{columns:2}.nav-links{gap:1rem}.nav-links a{font-size:.75rem}}
@media(max-width:480px){.gallery-grid{columns:2}.filters button{padding:.4rem .8rem;font-size:.7rem}}

.gallery-item{break-inside:avoid;margin-bottom:6px;overflow:hidden;cursor:pointer;position:relative;opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.gallery-item.visible{opacity:1;transform:translateY(0)}
.gallery-item.hidden{display:none}
.gallery-item img{width:100%;display:block;transition:transform .4s ease,filter .4s ease;filter:brightness(.9)}
.gallery-item:hover img{transform:scale(1.03);filter:brightness(1)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:90vh;object-fit:contain;opacity:0;transition:opacity .3s}
.lightbox img.loaded{opacity:1}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;width:40px;height:40px;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;z-index:210;opacity:.7;transition:opacity .3s}
.lb-close:hover{opacity:1}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;padding:1rem;opacity:.5;transition:opacity .3s;z-index:210}
.lb-nav:hover{opacity:1}
.lb-prev{left:.5rem}
.lb-next{right:.5rem}
.lb-counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:#999;font-size:.8rem;letter-spacing:.1em}

/* FOOTER */
.gallery-footer{text-align:center;padding:4rem 2rem 2rem;border-top:1px solid rgba(201,169,110,.1);margin-top:3rem}
.gallery-footer .links{display:flex;justify-content:center;gap:2rem;margin-bottom:1rem}
.gallery-footer .links a{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase}
.gallery-footer .copy{color:#555;font-size:.75rem}

const grid=document.getElementById("grid");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");
const lbCounter=document.getElementById("lbCounter");
let visible=D;
let idx=0;

function render(cat){
  grid.innerHTML="";
  visible=cat==="all"?D:D.filter(i=>i.c===cat);
  visible.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="gallery-item";
    const img=document.createElement("img");
    img.loading="lazy";
    img.src="/images/gallery/thumbs/"+item.f;
    img.alt="Villa Zeno Arete";
    img.onclick=()=>openLB(i);
    div.appendChild(img);
    grid.appendChild(div);
  });
  requestAnimationFrame(()=>observe());
}

const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");io.unobserve(e.target)}});
},{threshold:0.05});

function observe(){
  document.querySelectorAll(".gallery-item").forEach(el=>io.observe(el));
}

document.getElementById("filters").addEventListener("click",e=>{
  if(e.target.tagName!=="BUTTON")return;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render(e.target.dataset.cat);
});

function openLB(i){
  idx=i;showLB();
  lb.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLB(){
  lb.classList.remove("open");
  document.body.style.overflow="";
}
function showLB(){
  lbImg.classList.remove("loaded");
  lbImg.src="/images/gallery/"+visible[idx].f;
  lbImg.onload=()=>lbImg.classList.add("loaded");
  lbCounter.textContent=(idx+1)+" / "+visible.length;
}
function navLB(d){idx=(idx+d+visible.length)%visible.length;showLB();}

document.getElementById("lbClose").onclick=closeLB;
document.getElementById("lbPrev").onclick=()=>navLB(-1);
document.getElementById("lbNext").onclick=()=>navLB(1);
lb.addEventListener("click",e=>{if(e.target===lb)closeLB()});
document.addEventListener("keydown",e=>{
  if(!lb.classList.contains("open"))return;
  if(e.key==="Escape")closeLB();
  if(e.key==="ArrowLeft")navLB(-1);
  if(e.key==="ArrowRight")navLB(1);
});

render("all");
</script>
</body>
</html>
